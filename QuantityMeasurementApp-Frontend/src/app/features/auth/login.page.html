<div class="auth auth--split">
  <mat-card class="splitCard">
    <div class="splitCard__left">
      <div class="splitCard__leftInner">
        <div class="splitCard__title">Welcome!</div>
        <div class="splitCard__text">Create your account.<br />For free!</div>
        <a mat-stroked-button class="splitCard__cta" routerLink="/signup">Sign Up</a>
      </div>
    </div>

    <div class="splitCard__right">
      <div class="splitCard__rightInner">
        <div class="splitCard__rightTitle">Login</div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth__form">
          <mat-form-field appearance="outline">
            <mat-label>Username</mat-label>
            <input matInput formControlName="username" autocomplete="username" placeholder="Username" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Password</mat-label>
            <input
              matInput
              formControlName="password"
              type="password"
              autocomplete="current-password"
              placeholder="Password"
            />
          </mat-form-field>

          <button mat-stroked-button class="splitCard__primary" type="submit" [disabled]="loading || form.invalid">
            Sign In
          </button>
        </form>

        <div class="splitCard__smallLinks">
          <button mat-stroked-button class="googleBtn" type="button" (click)="googleLogin()">
            <span class="googleBtn__icon" aria-hidden="true">
              <svg viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.657 32.659 29.246 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.047 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 16.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.047 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.225 0-9.626-3.317-11.287-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a11.98 11.98 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
              </svg>
            </span>
            Continue with Google
          </button>
        </div>
      </div>
    </div>
  </mat-card>
</div>
