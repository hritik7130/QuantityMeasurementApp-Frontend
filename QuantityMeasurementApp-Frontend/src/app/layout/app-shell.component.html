<mat-sidenav-container class="shell">
  <mat-sidenav
    #drawer
    class="shell__nav"
    [mode]="isSmallScreen() ? 'over' : 'side'"
    [opened]="!isSmallScreen()"
  >
    <div class="shell__brand">
      <div class="shell__logo">QM</div>
      <div class="shell__title">
        <div class="shell__appname">{{ appName }}</div>
        <div class="shell__subtitle">Play • Learn • Measure</div>
      </div>
    </div>

    <mat-divider />

    <mat-nav-list>
      <a mat-list-item routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon matListItemIcon>calculate</mat-icon>
        <span matListItemTitle>Calculator</span>
      </a>

      <a mat-list-item routerLink="/history" routerLinkActive="active">
        <mat-icon matListItemIcon>history</mat-icon>
        <span matListItemTitle>History</span>
      </a>

      <a mat-list-item routerLink="/login" routerLinkActive="active" *ngIf="!isAuthed()">
        <mat-icon matListItemIcon>login</mat-icon>
        <span matListItemTitle>Login</span>
      </a>

      <a mat-list-item routerLink="/signup" routerLinkActive="active" *ngIf="!isAuthed()">
        <mat-icon matListItemIcon>person_add</mat-icon>
        <span matListItemTitle>Sign up</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="shell__content">
    <mat-toolbar class="shell__toolbar" color="primary">
      <button
        mat-icon-button
        (click)="drawer.toggle()"
        class="shell__burger"
        aria-label="Toggle navigation"
      >
        <mat-icon>menu</mat-icon>
      </button>

      <span class="shell__toolbarTitle">{{ appName }}</span>
      <span class="spacer"></span>

      <ng-container *ngIf="isAuthed(); else guest">
        <button mat-button [matMenuTriggerFor]="userMenu">
          <mat-icon>account_circle</mat-icon>
          <span>{{ username() || 'User' }}</span>
        </button>
        <mat-menu #userMenu="matMenu">
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </ng-container>

      <ng-template #guest>
        <a mat-button routerLink="/login">Login</a>
        <a mat-stroked-button routerLink="/signup">Sign up</a>
      </ng-template>
    </mat-toolbar>

    <div class="shell__page">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
